<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Ink Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            background-color: #fff;
            color: #000;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        ::-webkit-scrollbar { width: 0px; }
        .hidden { display: none !important; }
        .eink-btn { border: 2px solid #000; padding: 10px 20px; font-weight: bold; text-transform: uppercase; }
        .border-eink { border-bottom: 4px solid #000; }
        /* High contrast focus states for e-ink */
        input:focus { outline: 3px solid #000; outline-offset: 2px; }
    </style>
</head>
<body class="p-8 md:p-12 flex flex-col relative">

    <!-- Config Overlay -->
    <div id="setup-overlay" class="fixed inset-0 bg-white z-50 p-8 flex flex-col items-center justify-center border-4 border-black overflow-y-auto">
        <h1 class="text-4xl font-bold mb-8 uppercase tracking-tighter">Dashboard Setup</h1>
        <div class="space-y-4 w-full max-w-md">
            <input type="text" id="owm-key" placeholder="Weather API Key" class="w-full p-4 border-2 border-black text-xl">
            <input type="text" id="client-id" placeholder="Google Client ID" class="w-full p-4 border-2 border-black text-xl">
            <input type="text" id="user-email" placeholder="Google Email (for auto-login hint)" class="w-full p-4 border-2 border-black text-xl">
            <div class="flex gap-2">
                <input type="text" id="lat" placeholder="Lat" class="w-1/2 p-4 border-2 border-black">
                <input type="text" id="lon" placeholder="Lon" class="w-1/2 p-4 border-2 border-black">
            </div>
            <div class="grid grid-cols-2 gap-4 pt-4">
                <button onclick="saveConfig()" class="bg-black text-white p-4 font-bold uppercase hover:bg-gray-800 transition-colors">Save Local</button>
                <button onclick="generateSetupUrl()" class="border-2 border-black p-4 font-bold uppercase text-sm hover:bg-gray-100 transition-colors">Generate Link</button>
            </div>
            <div id="url-container" class="hidden mt-4 p-4 border-2 border-dashed border-black bg-gray-50">
                <p class="text-xs mb-2 font-bold uppercase">Paste this into Fully Kiosk:</p>
                <textarea id="setup-url-output" readonly class="w-full text-[10px] p-2 border border-gray-300 h-20 bg-white"></textarea>
                <button onclick="copySetupUrl()" class="mt-2 text-xs font-bold underline uppercase">Copy Link</button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard UI -->
    <header class="flex justify-between items-start mb-10">
        <div>
            <div id="clock" class="text-9xl font-light tracking-tighter leading-none">00:00</div>
            <div id="date" class="text-4xl text-gray-700 mt-4 uppercase tracking-[0.2em] font-medium">--</div>
        </div>
        <div id="weather-container" class="text-right flex items-center gap-6">
            <div class="flex flex-col items-end">
                <span id="temp" class="text-8xl font-normal leading-none">--°</span>
                <span id="condition" class="text-2xl uppercase font-semibold text-gray-600 mt-2">Syncing...</span>
            </div>
            <div id="weather-icon" class="flex items-center justify-center">
                <i data-lucide="cloud" class="w-24 h-24 stroke-[1.5]"></i>
            </div>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-12 flex-grow overflow-hidden">
        <!-- Agenda -->
        <section class="col-span-7 flex flex-col h-full overflow-hidden">
            <h2 class="text-3xl font-bold uppercase border-eink pb-2 mb-6 tracking-wider">Agenda</h2>
            <div id="calendar-list" class="flex-grow overflow-y-auto space-y-6 text-2xl">
                <div id="auth-status" class="italic text-gray-400">Initializing Google Services...</div>
            </div>
            <div id="g_id_signin_container" class="mt-4"></div>
        </section>

        <!-- Tasks -->
        <section class="col-span-5 flex flex-col h-full overflow-hidden">
            <h2 class="text-3xl font-bold uppercase border-eink pb-2 mb-6 tracking-wider">Tasks</h2>
            <div id="tasks-list" class="flex-grow overflow-y-auto space-y-4">
                <div class="italic text-gray-400">Waiting for sync...</div>
            </div>
        </section>
    </main>

    <!-- Footer Controls -->
    <footer class="flex justify-between items-center mt-6 pt-4 border-t-2 border-gray-100">
        <div class="flex items-center gap-4">
            <button onclick="refreshAll()" class="w-16 h-16 border-2 border-black flex items-center justify-center rounded-full hover:bg-black hover:text-white transition-all shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1">
                <i data-lucide="refresh-cw" class="w-7 h-7"></i>
            </button>
            <span class="text-sm font-bold uppercase tracking-widest text-gray-400">Last updated: <span id="last-update">--:--</span></span>
        </div>

        <div id="battery-status" class="flex items-center gap-2 text-2xl font-bold uppercase tracking-tighter">
            <span id="battery-percent">--%</span>
            <div id="battery-icon-container" class="flex items-center">
                <i data-lucide="battery" class="w-10 h-10"></i>
            </div>
        </div>
    </footer>

    <script>
        let config = JSON.parse(localStorage.getItem('einkConfig') || 'null');
        let gapiInited = false;
        let gisInited = false;
        let tokenClient;

        // Auto-load config from URL hash
        const hash = window.location.hash;
        if (hash.startsWith('#config=')) {
            try {
                config = JSON.parse(atob(hash.split('#config=')[1]));
                localStorage.setItem('einkConfig', JSON.stringify(config));
                window.history.replaceState(null, null, window.location.pathname);
            } catch(e) { console.error("Config load failed", e); }
        }

        window.onload = () => {
            if (!config || !config.clientId) {
                document.getElementById('setup-overlay').classList.remove('hidden');
                if (config) {
                    document.getElementById('owm-key').value = config.owmKey || '';
                    document.getElementById('client-id').value = config.clientId || '';
                    document.getElementById('user-email').value = config.email || '';
                    document.getElementById('lat').value = config.lat || '';
                    document.getElementById('lon').value = config.lon || '';
                }
                return;
            }
            document.getElementById('setup-overlay').classList.add('hidden');
            lucide.createIcons();
            updateClock();
            setInterval(updateClock, 30000);
            fetchWeather();
            setInterval(fetchWeather, 1800000);
            updateBattery();
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('last-update').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        async function fetchWeather() {
            if (!config?.owmKey) return;
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${config.lat}&lon=${config.lon}&appid=${config.owmKey}&units=metric`);
                const data = await res.json();
                document.getElementById('temp').textContent = Math.round(data.main.temp) + '°';
                document.getElementById('condition').textContent = data.weather[0].main;

                const iconCode = data.weather[0].icon;
                const iconMap = { '01':'sun', '02':'cloud-sun', '03':'cloud', '04':'cloud', '09':'cloud-drizzle', '10':'cloud-rain', '11':'cloud-lightning', '13':'snowflake', '50':'wind' };
                const lucideName = iconMap[iconCode.substring(0,2)] || 'cloud';
                document.getElementById('weather-icon').innerHTML = `<i data-lucide="${lucideName}" class="w-24 h-24"></i>`;
                lucide.createIcons();
            } catch (e) {}
        }

        // GOOGLE INTEGRATION
        function gapiLoaded() {
            gapi.load('client', async () => {
                await gapi.client.init({
                    discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest", "https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest"],
                });
                gapiInited = true;
                initIdentityServices();
            });
        }

        function gisLoaded() {
            gisInited = true;
            initIdentityServices();
        }

        function initIdentityServices() {
            if (!gapiInited || !gisInited || !config?.clientId) return;

            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: config.clientId,
                scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/tasks.readonly',
                callback: (tokenResponse) => {
                    if (tokenResponse.error !== undefined) throw (tokenResponse);
                    localStorage.setItem('gToken', JSON.stringify({
                        ...tokenResponse,
                        expires_at: Date.now() + (tokenResponse.expires_in * 1000)
                    }));
                    loadData();
                },
            });

            const savedToken = JSON.parse(localStorage.getItem('gToken') || 'null');
            if (savedToken && Date.now() < savedToken.expires_at) {
                gapi.client.setToken(savedToken);
                loadData();
            } else {
                document.getElementById('auth-status').innerHTML = `
                    <button onclick="requestToken()" class="eink-btn bg-black text-white hover:bg-gray-800">
                        Connect Google Account
                    </button>
                `;
                if (config.email) setTimeout(requestToken, 2000);
            }
        }

        function requestToken() {
            tokenClient.requestAccessToken({ prompt: config.email ? '' : 'consent', login_hint: config.email || '' });
        }

        async function loadData() {
            document.getElementById('auth-status').classList.add('hidden');
            try {
                const [cal, task] = await Promise.all([
                    gapi.client.calendar.events.list({ calendarId: 'primary', timeMin: new Date().toISOString(), maxResults: 5, singleEvents: true, orderBy: 'startTime' }),
                    gapi.client.tasks.tasks.list({ tasklist: '@default', maxResults: 10 })
                ]);
                renderCalendar(cal.result.items);
                renderTasks(task.result.items);
            } catch(e) {
                if (e.status === 401) {
                    localStorage.removeItem('gToken');
                    location.reload();
                }
            }
        }

        function renderCalendar(items) {
            const list = document.getElementById('calendar-list');
            list.innerHTML = items?.length ? '' : '<div class="italic text-gray-400">No upcoming events</div>';
            items?.forEach(item => {
                const start = new Date(item.start.dateTime || item.start.date);
                const timeStr = item.start.dateTime ? start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false }) : 'ALL DAY';
                list.innerHTML += `<div class="border-l-4 border-black pl-6 py-1">
                    <div class="font-bold text-lg text-gray-400 uppercase tracking-widest leading-none mb-1">${timeStr}</div>
                    <div class="text-3xl font-semibold leading-tight">${item.summary}</div>
                </div>`;
            });
        }

        function renderTasks(items) {
            const list = document.getElementById('tasks-list');
            list.innerHTML = items?.length ? '' : '<div class="italic text-gray-400">No active tasks</div>';
            items?.forEach(item => {
                list.innerHTML += `<div class="text-2xl py-3 border-b-2 border-gray-100 flex items-center gap-3">
                    <span class="text-black font-bold">○</span>
                    <span class="truncate">${item.title}</span>
                </div>`;
            });
        }

        // BATTERY ENGINE
        async function updateBattery() {
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                const updateUI = () => {
                    const level = Math.round(battery.level * 100);
                    document.getElementById('battery-percent').textContent = level + '%';

                    let iconName = 'battery';
                    if (battery.charging) iconName = 'battery-charging';
                    else if (battery.level <= 0.15) iconName = 'battery-low';
                    else if (battery.level >= 0.9) iconName = 'battery-full';
                    else if (battery.level <= 0.5) iconName = 'battery-medium';

                    document.getElementById('battery-icon-container').innerHTML = `<i data-lucide="${iconName}" class="w-8 h-8"></i>`;
                    lucide.createIcons();
                };
                updateUI();
                battery.addEventListener('levelchange', updateUI);
                battery.addEventListener('chargingchange', updateUI);
            } else {
                document.getElementById('battery-status').classList.add('hidden');
            }
        }

        function refreshAll() {
            updateClock();
            fetchWeather();
            if (gapi.client?.getToken()) loadData();
            updateBattery();
        }

        // CONFIG MANAGEMENT
        function saveConfig() {
            const c = {
                owmKey: document.getElementById('owm-key').value,
                clientId: document.getElementById('client-id').value,
                email: document.getElementById('user-email').value,
                lat: document.getElementById('lat').value,
                lon: document.getElementById('lon').value
            };
            localStorage.setItem('einkConfig', JSON.stringify(c));
            location.reload();
        }

        function generateSetupUrl() {
            const c = {
                owmKey: document.getElementById('owm-key').value,
                clientId: document.getElementById('client-id').value,
                email: document.getElementById('user-email').value,
                lat: document.getElementById('lat').value,
                lon: document.getElementById('lon').value
            };
            const encoded = btoa(JSON.stringify(c));
            const url = window.location.href.split('#')[0] + '#config=' + encoded;
            document.getElementById('setup-url-output').value = url;
            document.getElementById('url-container').classList.remove('hidden');
        }

        function copySetupUrl() {
            const el = document.getElementById('setup-url-output');
            el.select();
            document.execCommand('copy');
            alert("Setup URL copied to clipboard.");
        }
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
